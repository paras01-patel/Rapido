{% block css %}
<style>

/* GOOGLE FONT */
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6fb;
    margin: 0;
}

/* HERO */
.hero {
    background: linear-gradient(135deg, #ffcc00, #ffdb4d);
    padding: 120px 20px;
    text-align: center;
}

.hero h1 {
    font-size: 55px;
    font-weight: 700;
    margin-bottom: 10px;
}

.hero p {
    font-size: 18px;
    color: #333;
}

/* CONTAINER */
.container {
    max-width: 1150px;
    margin: 70px auto;
    padding: 0 20px;
}

/* FEATURED */
.featured {
    display: flex;
    gap: 40px;
    align-items: center;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.featured img {
    width: 50%;
    border-radius: 12px;
    transition: 0.4s;
}

.featured img:hover {
    transform: scale(1.05);
}

.text h2 {
    font-size: 30px;
    margin: 10px 0;
}

.text p {
    color: #555;
}

/* TAG */
.tag {
    display: inline-block;
    background: black;
    color: white;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
}

/* BUTTON */
button {
    background: black;
    color: white;
    padding: 12px 25px;
    border-radius: 30px;
    border: none;
    margin-top: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #333;
    transform: translateY(-2px);
}

/* SECTION TITLE */
.section-title {
    font-size: 34px;
    margin-bottom: 35px;
    text-align: center;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;
}

/* CARD */
.card {
    border-radius: 15px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.4s;
    position: relative;
}

.card img {
    width: 100%;
    height: 190px;
    object-fit: cover;
    transition: 0.4s;
}

.card:hover img {
    transform: scale(1.08);
}

.card h3 {
    padding: 15px;
    font-size: 19px;
}

.card p {
    padding: 0 15px 15px;
    color: #555;
    font-size: 14px;
}

.img-text {
    font-size: 13px;
    color: #777;
    padding: 12px 15px;
    line-height: 1.6;
}

.read-time {
    font-size: 12px;
    color: #999;
    padding: 0 15px;
}

/* CARD HOVER */
.card:hover {
    transform: translateY(-10px);
}

/* CTA */
.cta {
    background: linear-gradient(135deg, #000, #222);
    color: white;
    text-align: center;
    padding: 90px 20px;
    margin-top: 60px;
}

.cta h2 {
    font-size: 36px;
}

.cta button {
    background: #ffcc00;
    color: black;
    font-weight: bold;
}

/* RESPONSIVE */
@media (max-width: 768px) {

    .featured {
        flex-direction: column;
    }

    .featured img {
        width: 100%;
    }

    .hero h1 {
        font-size: 38px;
    }

}

</style>
{% endblock %}
