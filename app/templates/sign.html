{% extends "base.html" %}

{% block content %}

<style>

/* Full screen */
.signup-wrapper {
    height: 100vh;
    display: flex;
}

/* LEFT SIDE (Yellow branding) */
.left {
    width: 50%;
    background: #ffd400;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

.left h1 {
    font-size: 50px;
    font-weight: bold;
    color: black;
}

.left p {
    font-size: 18px;
    margin-top: 10px;
}

/* RIGHT SIDE (Form) */
.right {
    width: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
}

/* Form box */
.form-box {
    width: 350px;
}

.form-box h2 {
    margin-bottom: 25px;
}

/* Inputs */
.form-box input {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border: none;
    border-bottom: 2px solid #ccc;
    outline: none;
    font-size: 14px;
    transition: 0.3s;
}

/* Focus */
.form-box input:focus {
    border-bottom: 2px solid #000;
}

/* Button */
.form-box button {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    background: #000;
    color: #ffd400;
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

/* Hover */
.form-box button:hover {
    background: #222;
}

/* Message */
.msg {
    color: red;
    font-size: 14px;
}

/* Mobile responsive */
@media (max-width: 768px) {
    .left {
        display: none;
    }
    .right {
        width: 100%;
    }
}

</style>

<div class="signup-wrapper">

    <!-- LEFT -->
    <div class="left">
        <h1>Rapido</h1>
        <p>India’s Bike Taxi App</p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="form-box">

            <h2>Create Account</h2>

            {% for message in messages %}
                <p class="msg">{{ message }}</p>
            {% endfor %}

            <form method="POST">
                {% csrf_token %}

                <input type="text" name="username" placeholder="Full Name" required>

                <input type="tel" name="phone" placeholder="Mobile Number" required>

                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Sign Up</button>
            </form>

        </div>
    </div>

</div>

{% endblock %}
