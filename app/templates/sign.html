{% extends "base.html" %}
{% block css %}
<style>


.container{
    width: 360px;
    text-align: center;
    margin: 80px auto;
    padding: 30px;
    border-radius: 12px;
    
}

/* Heading */
.container h2 {
    margin-bottom: 20px;
    font-size: 24px;
    color: #333;
}

/* Inputs */
.container input {
    width: 100%;
    padding: 12px 14px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
    outline: none;
    font-size: 14px;
}

/* Focus */
.container input:focus {
    border-color: #ff7a18;
}

/* Button */
.container button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: #ff7a18;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

/* Hover */
.container button:hover {
    background: #e56a10;
}

/* Responsive */
@media (max-width: 400px) {
    .container {
        width: 90%;
    }
}

</style>
{% endblock css %}
{% block content %}
    <div class="container">
        <h2>Create Account</h2>
        <form method="POST">
            {% csrf_token %}
                <input type="text" name="username" placeholder="Enter Username" required>
                <br>
                <input type="text" name="phone" placeholder="Enter Mobile Number" required>
                <br>

                <input type="password" name="password" placeholder="Enter Password" required>
                <br>

                <button type="submit">Sign Up</button>
        </form>
    </div>

{% endblock content %}
